<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/team/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d9488" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Waste Management - Team Portal</title>
    <script>
      (function() {
        if (typeof window.process === 'undefined') {
          window.process = { env: {} };
        }
        if (typeof window.process.env === 'undefined') {
          window.process.env = {};
        }
        Object.assign(globalThis, { process: window.process });
      })();
    </script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/team/sw.js', { scope: '/team/' }).catch(() => {});
        });
      }
    </script>
  </body>
</html>
