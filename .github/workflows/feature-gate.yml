name: Feature Gate

on:
  push:
    branches-ignore:
      - main
  pull_request:

jobs:
  provider-territory-swap-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Type Check
        run: npx tsc --noEmit

      - name: Run Tests
        run: npx vitest run

      - name: Build Frontend
        run: npx vite build
